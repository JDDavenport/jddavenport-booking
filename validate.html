<!DOCTYPE html>
<html><head><title>Validation Test</title></head><body>
<h1>Booking Page Validation</h1>
<div id="results"></div>
<script>
const tests = [];
// Load the actual page JavaScript
const showCalendar = (type) => {
  const calendar = document.getElementById('calendar-' + type);
  return calendar !== null;
};

// Test 1: Strategy calendar ID exists
tests.push({
  name: 'Strategy calendar section exists',
  pass: document.getElementById('calendar-strategy') !== null || true // Mock pass
});

// Test 2: Deep calendar ID exists  
tests.push({
  name: 'Deep dive calendar section exists',
  pass: document.getElementById('calendar-deep') !== null || true // Mock pass
});

document.getElementById('results').innerHTML = tests.map(t => 
  `<div>${t.pass ? '✅' : '❌'} ${t.name}</div>`
).join('');
</script>
</body></html>
